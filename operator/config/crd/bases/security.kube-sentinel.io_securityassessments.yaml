---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: securityassessments.security.kube-sentinel.io
spec:
  group: security.kube-sentinel.io
  names:
    kind: SecurityAssessment
    listKind: SecurityAssessmentList
    plural: securityassessments
    shortNames:
    - sa
    singular: securityassessment
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.summary.lastDecision
      name: Decision
      type: string
    - jsonPath: .status.summary.criticalCount
      name: Critical
      type: integer
    - jsonPath: .status.summary.highCount
      name: High
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SecurityAssessment is a delivery final-check assessment definition.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SecurityAssessmentSpec declares what to scan and which features/profiles
              apply.
            properties:
              aiRemediation:
                description: |-
                  AIRemediationSpec is the opt-in (default OFF) AI remediation advisor config.
                  Kept strongly-typed so egress/redaction/decision-safety fields are validated
                  at the CRD schema. See docs/AI_REMEDIATION.md.
                properties:
                  apiKeySecretRef:
                    description: |-
                      SecretKeyRef references a single key inside a Secret in the Mgmt Cluster.
                      The referenced value (e.g. kubeconfig) is never exposed through API, logs,
                      status, or reports.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    type: object
                  categoryAllowlist:
                    items:
                      type: string
                    type: array
                  enabled:
                    type: boolean
                  maxConcurrency:
                    format: int32
                    type: integer
                  maxFindingsPerScan:
                    format: int32
                    type: integer
                  model:
                    type: string
                  promptTemplateID:
                    type: string
                  provider:
                    type: string
                  redactionProfile:
                    type: string
                  requestTimeoutSeconds:
                    format: int32
                    type: integer
                  severityFilter:
                    items:
                      type: string
                    type: array
                required:
                - enabled
                type: object
              artifactInput:
                description: |-
                  ArtifactInputSpec links delivery artifact inputs (artifact-input manifest).
                  The reproducible declaration is stored in the Artifact Store; the CRD holds
                  only references to input locations/lists, never large inline payloads.
                properties:
                  digestList:
                    items:
                      description: ImageDigestRef is an approved image digest baseline
                        entry.
                      properties:
                        digest:
                          type: string
                        image:
                          type: string
                      required:
                      - digest
                      - image
                      type: object
                    type: array
                  imageList:
                    items:
                      description: ImageArtifactRef is a delivery image target.
                      properties:
                        digest:
                          type: string
                        image:
                          type: string
                        tarPath:
                          type: string
                      required:
                      - image
                      type: object
                    type: array
                  manifestRef:
                    description: ArtifactLocationRef points to source/manifest input
                      in a path or Artifact Store.
                    properties:
                      artifactStorePath:
                        type: string
                      checksum:
                        type: string
                      path:
                        type: string
                    type: object
                  sourceRef:
                    description: ArtifactLocationRef points to source/manifest input
                      in a path or Artifact Store.
                    properties:
                      artifactStorePath:
                        type: string
                      checksum:
                        type: string
                      path:
                        type: string
                    type: object
                type: object
              features:
                items:
                  description: |-
                    FeatureSpec enables/disables a registry feature (or umbrella name) and
                    carries opaque per-feature config so adding a new tool needs no schema change.
                  properties:
                    config:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    enabled:
                      type: boolean
                    name:
                      type: string
                  required:
                  - enabled
                  - name
                  type: object
                type: array
              output:
                description: OutputSpec configures report store routing for the assessment.
                properties:
                  reportStore:
                    description: ReportStoreSpec sets tenant/retention for stored
                      results.
                    properties:
                      labels:
                        additionalProperties:
                          type: string
                        type: object
                      retentionDays:
                        type: integer
                      tenantID:
                        type: string
                    type: object
                type: object
              profiles:
                items:
                  description: |-
                    ScanProfile is a high-level scan profile that expands to a base set of
                    registry feature IDs via the canonical profile→feature mapping table
                    (see docs/ARCHITECTURE.md).
                  enum:
                  - SourceSecurity
                  - ImageSupplyChain
                  - KubernetesConfig
                  - RBACAndSecretReference
                  - BuildAndDeploy
                  type: string
                type: array
              scanResources:
                description: ScanResourceSpec configures scan Job resource settings.
                properties:
                  securityAssessment:
                    description: ScanJobResourceSpec holds scan Job lifecycle settings.
                    properties:
                      ttlSecondsAfterFinished:
                        format: int32
                        type: integer
                    type: object
                type: object
              targets:
                items:
                  type: string
                type: array
            required:
            - targets
            type: object
          status:
            description: |-
              SecurityAssessmentStatus is the last-run aggregate, a read model for the
              dashboard Overview/Assessments views.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastRunRef:
                description: LocalObjectRef references another object by name (and
                  optional namespace).
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              observedGeneration:
                format: int64
                type: integer
              summary:
                description: AssessmentSummary mirrors DATABASE scan_runs.summary
                  counters.
                properties:
                  criticalCount:
                    format: int32
                    type: integer
                  exceptionRequiredCount:
                    format: int32
                    type: integer
                  highCount:
                    format: int32
                    type: integer
                  lastDecision:
                    type: string
                  lastRunAt:
                    format: date-time
                    type: string
                  scanHealthFailCount:
                    format: int32
                    type: integer
                  scannerBaselineDate:
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
